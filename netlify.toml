[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

# URLs de campaña segmentadas
[[redirects]]
  from = "/progresiva"
  to   = "/?tipo=vivienda_progresiva#encuesta"
  status = 302

[[redirects]]
  from = "/lote"
  to   = "/?tipo=lote_200#encuesta"
  status = 302

[[redirects]]
  from = "/lote-grande"
  to   = "/?tipo=lote_800#encuesta"
  status = 302

[[redirects]]
  from = "/casa"
  to   = "/?tipo=casa_terminada#encuesta"
  status = 302

[[redirects]]
  from = "/arjona"
  to   = "/?ciudad=Arjona#encuesta"
  status = 302

[[redirects]]
  from = "/turbaco"
  to   = "/?ciudad=Turbaco#encuesta"
  status = 302

[[redirects]]
  from = "/alcaldia"
  to   = "/?origen=alcaldia#encuesta"
  status = 302

[[redirects]]
  from = "/educacion"
  to   = "/?origen=educacion#encuesta"
  status = 302
