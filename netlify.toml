[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

# URLs amigables por ciudad y tipo
[[redirects]]
  from = "/progresiva"
  to   = "/?tipo=vivienda_progresiva#encuesta"
  status = 302

[[redirects]]
  from = "/lote"
  to   = "/?tipo=lote_200#encuesta"
  status = 302

[[redirects]]
  from = "/arjona"
  to   = "/?ciudad=Arjona#encuesta"
  status = 302

[[redirects]]
  from = "/turbaco"
  to   = "/?ciudad=Turbaco#encuesta"
  status = 302
