[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
    [headers.values]
    Cache-Control = "public, max-age=86400"

# Redireccionamiento para URLs limpias
[[redirects]]
  from = "/arjona"
  to = "/?ciudad=Arjona"
  status = 302

[[redirects]]
  from = "/turbaco"
  to = "/?ciudad=Turbaco"
  status = 302

[[redirects]]
  from = "/cartagena"
  to = "/?ciudad=Cartagena"
  status = 302
